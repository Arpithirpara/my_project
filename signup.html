<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="signup.css">
  </head>
  <body>
            <div id="signupform">
              <img src="logo.png">

              <h2>sing up</h2>
              
              <form onsubmit="signup(event)">
                
               <input type="text" id="name" placeholder="full name" required><br>

               <input type="email" id="email" placeholder="Email" required><br>

                <input type="tel" id="phone" placeholder="Phone number" required><br>
              <input type="password" id="password" placeholder="password" required><br>

              <input type="password" id="confirm" placeholder="confirm password" required><br>

              <button>Register</button>
              </form>

              <div id="login_form">
                Already have an account   <a href="login.html"> Login </a>
              </div>

            </div>

  </body>
          <script >
            
  window.onload = function () {
    if (localStorage.getItem("isLoggedIn") === "true") {
      window.location.href = "grocery.html";
    }
  };

  function signup(event) {
    event.preventDefault();
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    if (name.length < 3) { alert("Name must be at least 3 characters"); return; }
    if (!email.includes("@") || !email.includes(".")) { alert("Please enter a valid email"); return; }
    if (phone.length < 10) { alert("Please enter valid phone number"); return; }
    if (password.length < 1) { alert("Password required"); return; }
    if (password !== confirm) { alert("Passwords do not match"); return; }

    fetch("https://groceryproject-production.up.railway.app/api/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, email, phone, password })
    })
    .then(res => res.text())
    .then(msg => {
      if (msg === "SIGNUP_SUCCESS") {
        alert("Signup successful ✅ Please login");
        window.location.href = "login.html";
      } else if (msg === "EMAIL_ALREADY_EXISTS") {
        alert("Email already exists ❌");
      } else if (msg === "PHONE_ALREADY_EXISTS") {
        alert("Phone already registered!");
      } else {
        alert("Something went wrong: " + msg);
      }
    })
    .catch(err => console.error("Error:", err));
  }
</script>
          </script>
</html>
